<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Final Clue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>

    <main class="stage">
      <p class="brand">The Final Clue</p>

      <section id="gate" class="panel" aria-live="polite">
        <h1 class="headline">Enter the password</h1>
        <p class="lede">
          One word unlocks what’s next. Type it carefully — spelling counts.
        </p>

        <form id="password-form" class="password-form" autocomplete="off">
          <label class="field-label" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="password-input"
            placeholder="••••••••"
            required
            autofocus
          />
          <button type="submit" class="submit-btn">Unlock</button>
          <p id="error" class="error" hidden>That’s not it. Try again.</p>
        </form>
      </section>

      <section id="success" class="panel success" hidden>
        <h1 class="headline">You’re in.</h1>
        <p class="lede success-message">
          Congratulations — you will receive a letter shortly.
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
